name: CI

on:
  push:
    branches:
      - main
      - orchestra-v2-prototype
  pull_request:

jobs:
  smoke-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Compile Python files
        run: |
          python -m compileall .

      - name: Run CLI smoke test
        run: |
          python tests/smoke_cli.py
